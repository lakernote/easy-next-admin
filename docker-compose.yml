name: easy-next-admin

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: easy-next-admin-mysql
    restart: unless-stopped
    command:
      - --max_connections=300
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: easy-next-admin
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysqlData:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - easy_next_admin_net

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    container_name: easy-next-admin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-111222}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-111222}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisData:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-111222} ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - easy_next_admin_net

volumes:
  mysqlData:
  redisData:

networks:
  easy_next_admin_net:
    driver: bridge
