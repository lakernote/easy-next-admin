name: 功能建议
description: 提出适合企业后台脚手架的改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 业务场景
      description: 说明这个建议解决什么企业后台场景。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述你希望 EasyNextAdmin 如何支持。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: 边界确认
      options:
        - label: 该建议不把项目变成低代码平台、BI 平台或完整 BPM 平台
          required: true
        - label: 该建议可以通过当前 Spring Boot 3 + Vue 3 架构落地
          required: true
