name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        run: mvn -pl easy-next-admin-server -am test

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: easy-next-admin-web/package-lock.json

      - name: Install dependencies
        working-directory: easy-next-admin-web
        run: npm ci

      - name: Run frontend unit tests
        working-directory: easy-next-admin-web
        run: npm run test:unit

      - name: Build frontend
        working-directory: easy-next-admin-web
        run: npm run build
